# Deploy CRM Dashboard (Next.js) to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crm-dashboard/package-lock.json

      - name: Install and build
        run: |
          cd crm-dashboard
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: crm-dashboard/out

  deploy:
    needs: build
    environment: github_pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4
